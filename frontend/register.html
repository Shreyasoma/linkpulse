<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkPulse - Register</title>

  <link rel="stylesheet" href="./css/register.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>LinkPulse</h1>

      <h2>Create Your Account</h2>

      <form id="register-form">

        <input
          type="text"
          id="name"
          placeholder="Name"
          required
        >

        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        >

        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        >

        <button type="submit">
          Register
        </button>

      </form>

      <p id="message"></p>

      <p>
        Already have an account?

        <a href="./login.html">
          Login
        </a>
      </p>

    </div>

  </div>
  <div id="toast"></div>
  <script src="./js/register.js"></script>

</body>
</html>
