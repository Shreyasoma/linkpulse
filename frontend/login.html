<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LinkPulse - Login</title>

  <link rel="stylesheet" href="./css/login.css">
</head>
<body>

  <div class="container">

    <div class="card">

      <h1>LinkPulse</h1>

      <h2>Welcome Back</h2>

      <form id="login-form">

        <input
          type="email"
          id="email"
          placeholder="Email"
          required
        >

        <input
          type="password"
          id="password"
          placeholder="Password"
          required
        >

        <button type="submit">
          Login
        </button>

      </form>

      <p id="message"></p>

      <p>
        Don't have an account?

        <a href="./register.html">
          Register
        </a>
      </p>

    </div>

  </div>
  <div id="toast"></div>

  <script src="./js/login.js"></script>

</body>
</html>
